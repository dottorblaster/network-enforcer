// protolint:disable MAX_LINE_LENGTH
syntax = "proto3";

package networkenforcer.agent.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/rancher-sandbox/network-enforcer/proto/agent/v1;agentv1";

service NetworkAgent {
  // ScrapeViolations drains the cniwatcher's in-memory violation buffer and
  // returns all accumulated records since the last scrape.
  rpc ScrapeViolations(ScrapeViolationsRequest) returns (ScrapeViolationsResponse) {}
}

message ViolationRecord {
  // Timestamp when the deny occurred.
  google.protobuf.Timestamp timestamp = 1;
  // Node whose cniwatcher reported the violation.
  string node_name = 2;
  // Direction of the flow: "egress" or "ingress".
  string direction = 3;

  // Source endpoint.
  string source_namespace = 4;
  string source_name = 5;
  repeated string source_workloads = 6;
  repeated string source_labels = 7;

  // Destination endpoint.
  string dest_namespace = 8;
  string dest_name = 9;
  repeated string dest_workloads = 10;
  repeated string dest_labels = 11;

  // L4 protocol: "TCP", "UDP", "ICMP", "SCTP".
  string protocol = 12;
  // Destination port. 0 when unavailable (e.g. ICMP, or backends that don't expose it).
  int32 dst_port = 13;
  // Action is always "protect" (only protect mode produces denies).
  string action = 14;
  // Namespace of the NetworkPolicy that denied the traffic.
  string denying_policy_namespace = 15;
  // Name of the NetworkPolicy that denied the traffic.
  string denying_policy_name = 16;
}

message ScrapeViolationsRequest {}

message ScrapeViolationsResponse {
  // Violations in reverse chronological order (newest first). Empty when the
  // buffer has no records since the last scrape.
  repeated ViolationRecord violations = 1;
}
