apiVersion: security.rancher.io/v1alpha1
kind: WorkloadNetworkPolicy
metadata:
  name: example-workload-network-policy
  namespace: default
spec:
  # "monitor" observes traffic without enforcing; "protect" actively
  # enforces the policy. Defaults to "monitor" when omitted.
  mode: monitor
  policy:
    # Standard networking.k8s.io NetworkPolicySpec semantics apply to the
    # embedded policy.
    podSelector: {}
    policyTypes:
      - Ingress
      - Egress
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
        ports:
          - protocol: TCP
            port: 53
          - protocol: UDP
            port: 53
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
        ports:
          - protocol: TCP
            port: 53
          - protocol: UDP
            port: 53
